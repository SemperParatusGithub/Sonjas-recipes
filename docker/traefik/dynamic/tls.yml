# Cloudflare Origin CA Certificate
tls:
  certificates:
    - certFile: /etc/traefik/certs/origin-cert.pem
      keyFile: /etc/traefik/certs/origin-key.pem
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/origin-cert.pem
        keyFile: /etc/traefik/certs/origin-key.pem
