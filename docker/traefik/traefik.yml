global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO
  format: json
  filePath: /var/log/traefik/traefik.json

accessLog:
  filePath: /var/log/traefik/access.json
  format: json

api:
  dashboard: true
  # Dashboard is exposed via Docker labels — never expose it on a public entrypoint

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      middlewares:
        - security-headers@file

  # Internal-only entrypoint for ping healthchecks — NOT exposed in docker-compose ports
  traefik:
    address: ":8082"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: web
    watch: true

  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

ping:
  entryPoint: traefik
