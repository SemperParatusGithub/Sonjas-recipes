<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Köchin - Deine moderne Rezeptplattform">
  <title>Köchin - Kommt Bald</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #e85d04;
      --primary-dark: #d45a04;
      --bg: #fff7ed;
      --text: #1c1917;
      --text-muted: #78716c;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1917;
        --text: #fff7ed;
        --text-muted: #a8a29e;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .description {
      font-size: 1.25rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1.5rem;
      margin-top: 3rem;
    }

    .feature {
      padding: 1.5rem;
      background: rgba(232, 93, 4, 0.1);
      border-radius: 12px;
    }

    .feature-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .feature-title {
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--primary);
    }

    .footer {
      margin-top: 4rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">👨‍🍳</div>
    <h1>Köchin</h1>
    <p class="description">
      Deine moderne Rezeptplattform zum Entdecken, Teilen und Genießen.
    </p>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">📚</div>
        <div class="feature-title">Rezepte</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔍</div>
        <div class="feature-title">Suchen</div>
      </div>
      <div class="feature">
        <div class="feature-icon">❤️</div>
        <div class="feature-title">Favoriten</div>
      </div>
    </div>

    <p class="footer">
      Launching soon
    </p>
  </div>
</body>
</html>
